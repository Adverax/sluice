# golangci-lint configuration (CON-004). The CI lint job runs `golangci-lint run`
# and is mandatory for every PR. At minimum staticcheck + errcheck + govet are
# enabled per the card; gofmt/ineffassign/unused round out a sensible baseline.
run:
  timeout: 5m
  # Lint the integration-tagged files too so the deferred-path tests stay clean.
  build-tags:
    - integration

linters:
  enable:
    - staticcheck   # incl. SA* (the api.GetSwagger SA1019 deprecation is fixed)
    - errcheck      # unchecked errors
    - govet         # go vet
    - ineffassign   # ineffectual assignments
    - unused        # unused code
    - gofmt         # formatting

issues:
  # Show all findings (CI gate must see everything).
  max-issues-per-linter: 0
  max-same-issues: 0
