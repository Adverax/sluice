# golangci-lint configuration (CON-004), schema v2.
# The CI lint job runs `golangci-lint run` and is mandatory for every PR/push.
# v2's default linter set covers errcheck, govet, ineffassign, staticcheck (incl.
# the SA/ST/QF families) and unused; gofmt runs as a formatter. That matches the
# original baseline. Integration-tagged files are linted too so the deferred-path
# tests stay clean.
version: "2"
run:
  build-tags:
    - integration
linters:
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
