# forge CI gate — copy into your project's .github/workflows/forge.yml
#
# Runs forge's DETERMINISTIC disciplines as an automatic gate: architecture
# validators (incl. trace↔code drift), synthesis-blocking decisions, stale
# artifacts. Fails the build on a hard-gate violation. LLM disciplines (review,
# reverse, AC verification) are NOT here — CI runs no agent.
#
# Setup:
#   1. Copy this file to .github/workflows/forge.yml in your project.
#   2. forge is private → add a repo secret FORGE_TOKEN (a fine-grained PAT with
#      read access to Adverax/forge). For a public fork, drop the `token:` line.
#   3. Set the --meta path below to where your forge model lives
#      (default `meta`; e.g. `services/cloud/meta` for a nested service).
#   4. Tune gate levels in meta/.skills.yml → ci.gates (error | warn | off).

name: forge
# Manual-only on this public reference repo. This gate checks out the PRIVATE
# Adverax/forge plugin via the FORGE_TOKEN secret, which forks and external PRs
# do not have — so auto-running on push/PR would fail by design. The architecture
# drift-gate is kept here as a real, runnable artifact (it's part of how this repo
# was built): the owner can trigger it from the Actions tab, and a fork with its
# own FORGE_TOKEN can re-enable the push/pull_request triggers below.
on:
  workflow_dispatch:

jobs:
  forge-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Checkout forge (private plugin)
        uses: actions/checkout@v5
        with:
          repository: Adverax/forge
          ref: main                       # pin to a tag/SHA for reproducible gates
          token: ${{ secrets.FORGE_TOKEN }}
          path: .forge

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install deps
        run: pip install ruamel.yaml

      - name: forge CI gate
        run: python .forge/skills/architect-validate/scripts/ci.py --meta meta
        # nested service example:
        # run: python .forge/skills/architect-validate/scripts/ci.py --meta services/cloud/meta
