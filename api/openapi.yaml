openapi: 3.0.3
info:
  title: sluice gateway API
  description: |
    Public HTTP API for the sluice LLM gateway.

    This specification is the single source of truth for the wire contract
    (ADR-0011, contract-first). Server types and the routing boundary are
    generated from it with `oapi-codegen` v2 (`std-http-server` + `models` +
    `strict-server`). Handlers implement the generated `StrictServerInterface`
    and map these public DTOs to/from the canonical
    `provider.Request`/`Response` via the anti-corruption layer (ADR-0009).

    The edge speaks the **real OpenAI `/v1/chat/completions` wire format**
    (ADR-0012, v1 subset) so unmodified OpenAI SDKs and `curl` examples work
    against sluice as a drop-in. The request schema is **liberal-accept**
    (`additionalProperties: true`): unknown OpenAI fields (`seed`, `user`,
    `presence_penalty`, `frequency_penalty`, `logit_bias`, `response_format`,
    `n`, `logprobs`, …) are accepted and silently ignored, never `400`.
  version: 2.0.0

servers:
  - url: /
    description: The gateway exposes paths relative to its listen address.

paths:
  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      summary: Create a chat completion
      description: |
        Runs a chat completion against the upstream model selected by `model`.

        When `stream` is `false` (the default) the gateway returns a single
        JSON `ChatCompletionResponse` (200).

        When `stream` is `true` the gateway responds with a
        `text/event-stream` (Server-Sent Events) body instead of the JSON
        document below. OpenAPI 3.0 cannot fully express an SSE response, so
        only the non-streaming success shape is modelled here; the SSE wire
        behaviour is implemented and tested in CARD-004.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: |
            The chat completion. For `stream:false` the body is a JSON
            `ChatCompletionResponse`. For `stream:true` the body is a
            `text/event-stream` (SSE) sequence (see operation description;
            CARD-004).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream of completion deltas (CARD-004).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe (FR-008)
      description: Returns 200 as long as the process is alive.
      responses:
        '200':
          description: The process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /readyz:
    get:
      operationId: getReadyz
      summary: Readiness probe (FR-009)
      description: |
        Returns 200 when every registered dependency is healthy, or 503 when
        at least one dependency is down. The body carries a per-dependency
        status map in both cases.
      responses:
        '200':
          description: All dependencies are healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'
        '503':
          description: At least one dependency is down.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics exposition
      description: |
        Prometheus text exposition format. Documented here for completeness;
        the body is plain text and not modelled as a JSON schema.
      responses:
        '200':
          description: Prometheus metrics in text exposition format.
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    Message:
      type: object
      description: |
        One OpenAI chat message. `content` is a plain string (the v1 subset);
        multimodal/array content is a documented non-goal (ADR-0012, CON-008)
        and is rejected with an OpenAI-shaped 400 by the handler.
        `additionalProperties: true` so SDK-supplied extras (e.g. `name`) are
        accepted and ignored, never a 400 (liberal-accept).
      additionalProperties: true
      required:
        - role
        - content
      properties:
        role:
          type: string
          description: The author of the message.
          enum:
            - system
            - user
            - assistant
        content:
          type: string
          description: The message text.

    ChatCompletionRequest:
      type: object
      description: |
        A real OpenAI `/v1/chat/completions` request (ADR-0012 v1 subset). Only
        `model`, `messages`, `stream`, `temperature`, `top_p`, `max_tokens` and
        `stop` are modeled and forwarded upstream; every other field is
        accepted-but-ignored via `additionalProperties: true` (liberal-accept).
      additionalProperties: true
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: The upstream model to run the completion against.
        messages:
          type: array
          description: The ordered chat history for the completion.
          items:
            $ref: '#/components/schemas/Message'
        stream:
          type: boolean
          description: |
            When true, the gateway responds with a `text/event-stream` (SSE)
            body of `chat.completion.chunk` events terminated by `data: [DONE]`.
          default: false
        max_tokens:
          type: integer
          description: Optional upper bound on the completion length.
        temperature:
          type: number
          description: Optional sampling temperature.
        top_p:
          type: number
          description: Optional nucleus-sampling probability mass.
        stop:
          description: |
            Optional stop sequences that end generation. Accepts a single
            string or an array of strings, matching the OpenAI wire contract.
          nullable: true
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    Usage:
      type: object
      description: |
        Token accounting for a completion (OpenAI shape). Aligned with the
        canonical provider.Usage.
      required:
        - prompt_tokens
        - completion_tokens
        - total_tokens
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer

    ResponseMessage:
      type: object
      description: The assistant message inside a chat.completion choice.
      required:
        - role
        - content
      properties:
        role:
          type: string
          description: Always "assistant" for a completion choice.
        content:
          type: string
          description: The assistant completion text.

    Choice:
      type: object
      description: One chat.completion choice. The gateway always returns exactly one (index 0).
      required:
        - index
        - message
        - finish_reason
      properties:
        index:
          type: integer
          description: The choice index (always 0 — n>1 is a non-goal, CON-008).
        message:
          $ref: '#/components/schemas/ResponseMessage'
        finish_reason:
          type: string
          nullable: true
          description: The reason the completion ended (e.g. "stop", "length").

    ChatCompletionResponse:
      type: object
      description: |
        A real OpenAI `chat.completion` object (ADR-0012). `id`, `object` and
        `created` are generated at the edge (not passed through from upstream);
        `system_fingerprint` is omitted.
      required:
        - id
        - object
        - created
        - model
        - choices
        - usage
      properties:
        id:
          type: string
          description: An edge-generated completion id, prefixed "chatcmpl-".
        object:
          type: string
          description: Always "chat.completion".
        created:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the gateway built the response.
        model:
          type: string
          description: The model that produced the completion.
        choices:
          type: array
          description: The completion choices (always exactly one — index 0).
          items:
            $ref: '#/components/schemas/Choice'
        usage:
          $ref: '#/components/schemas/Usage'

    HealthStatus:
      type: object
      description: Liveness probe response.
      required:
        - status
      properties:
        status:
          type: string
          description: Overall liveness status.

    ReadinessStatus:
      type: object
      description: Readiness probe response with a per-dependency status map.
      required:
        - status
        - dependencies
      properties:
        status:
          type: string
          description: Overall readiness status.
        dependencies:
          type: object
          description: Per-dependency status; "ok" or an error description.
          additionalProperties:
            type: string

    ErrorDetail:
      type: object
      description: The OpenAI error object carried inside an Error envelope.
      required:
        - message
        - type
      properties:
        message:
          type: string
          description: A human-readable description of the error.
        type:
          type: string
          description: The OpenAI error type (e.g. "invalid_request_error", "server_error").
        code:
          type: string
          nullable: true
          description: A short, machine-readable error code (may be null).
        param:
          type: string
          nullable: true
          description: The request parameter the error relates to, when applicable (may be null).

    Error:
      type: object
      description: |
        The OpenAI error envelope `{ "error": { message, type, code } }` so
        unmodified OpenAI SDKs parse gateway and mapped-upstream errors
        (ADR-0012, FR-020).
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'

  responses:
    BadRequest:
      description: The request was malformed or failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: The request was not authorized.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource (e.g. model) was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: The client has been rate limited.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: An unexpected server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGateway:
      description: The upstream provider returned an invalid response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: The gateway or an upstream dependency is currently unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
