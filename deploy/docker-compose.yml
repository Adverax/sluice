# Local backing infrastructure for `make run` and ad-hoc development.
# NOTE (CON-005): the full stack also includes the gateway image, prometheus and
# grafana. Those need a Dockerfile + deploy/ config that the implementation cards
# create; they will be added here (above or below the managed block, or by a
# /forge:harness sync once those facts exist). Integration tests use
# testcontainers-go and spin up their own containers — they do not need this file.

