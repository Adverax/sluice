non_functional:
  - id: NFR-001
    category: performance
    metric: gateway_p95_overhead_ms
    threshold: 20ms
    condition: under sustained load of several thousand RPS, excluding provider latency
    rationale: >
      The goal is a thin, predictable layer. The gateway p95 overhead (excluding model
      latency) must remain ≤ 20ms so as not to add meaningful delay to real
      LLM calls.
    acceptance:
      - id: AC-042
        given: mock provider with fixed 0ms latency, load of several thousand RPS
        when: load test (k6/vegeta) runs for 5 minutes
        then: gateway p95 latency (overhead) <= 20ms across the entire plateau
        kind: boundary
        test: BenchGateway_p95OverheadUnder20ms

  - id: NFR-002
    category: availability
    metric: error_rate_under_overload
    threshold: "0% crashes; 100% requests either served or rejected with 429/503"
    condition: under load of 2–3× nominal capacity
    rationale: >
      Under overload the service must not crash. Excess requests are rejected with
      429/503, but the process continues running and recovers once load subsides.
    acceptance:
      - id: AC-043
        given: load at 3× nominal RPS for 2 minutes
        when: load test runs
        then: no panics occur, process uptime is 100%, all responses are 200/429/503; after load drops gateway accepts requests
        kind: boundary
        test: BenchGateway_Overload3x_NocrashGracefulDegradation

  - id: NFR-003
    category: maintainability
    metric: goroutine_leak_count
    threshold: "0 leaked goroutines"
    condition: pprof measurement before and after load test
    rationale: >
      Goroutine leaks are a direct symptom of concurrency management errors.
      A pprof snapshot taken before and after the load test must show the same
      baseline goroutine count.
    acceptance:
      - id: AC-044
        given: baseline goroutine count recorded before the load test
        when: load test completes and load has subsided
        then: goroutine count equals baseline (tolerance ±5 background goroutines)
        kind: boundary
        test: BenchGateway_GoroutineLeakCheck

  - id: NFR-004
    category: operability
    metric: timeout_coverage
    threshold: "100% of boundaries have timeouts"
    condition: static analysis of http.Server, upstream client, Redis, Postgres configuration
    rationale: >
      Unbounded waits are the root cause of goroutine leaks and hangs under load.
      Every boundary (HTTP server, upstream client, Redis, Postgres) must have
      an explicit timeout.
    acceptance:
      - id: AC-045
        given: configuration of the running service
        when: ReadTimeout, WriteTimeout, IdleTimeout of http.Server; upstream http.Client timeout; Redis dial/read timeout; pgx pool acquire timeout are checked
        then: all six timeouts are > 0
        kind: happy
        test: TestConfig_AllBoundariesHaveTimeouts

  - id: NFR-005
    category: operability
    metric: graceful_shutdown_drain_completeness
    threshold: "0 in-flight requests dropped on SIGTERM"
    condition: when in-flight request count > 0 at the moment SIGTERM is received
    rationale: >
      A normal deployment must not interrupt in-flight requests. Gateway waits for
      all active requests to complete before exiting.
    acceptance:
      - id: AC-046
        given: 10 in-flight requests, mock with 300ms latency
        when: SIGTERM is received
        then: all 10 requests complete successfully; process exit code 0; log contains "drained 10 requests"
        kind: happy
        test: TestGracefulShutdown_ZeroDropped

  - id: NFR-006
    category: scalability
    metric: upstream_goroutine_count_bounded
    threshold: "<= worker_pool_limit goroutines waiting on upstream"
    condition: under any incoming load
    rationale: >
      The number of goroutines waiting for an upstream response is strictly bounded
      by the pool size. Exceeding this limit indicates missing backpressure.
    acceptance:
      - id: AC-047
        given: worker pool limit = 50, load of 500 RPS
        when: load test runs for 1 minute
        then: goroutine count on the upstream path never exceeds 50
        kind: boundary
        test: BenchGateway_GoroutineCountBounded

  - id: NFR-007
    category: observability
    metric: required_metrics_exposed
    threshold: "6/6 required metrics present in /metrics"
    condition: at any point during service operation
    rationale: >
      Without the full set of metrics an operator cannot diagnose problems via Grafana.
      The required metric set is fixed in the specification.
    acceptance:
      - id: AC-048
        given: gateway is running with Prometheus enabled
        when: GET /metrics is requested
        then: response contains http_requests_total, http_request_duration_seconds, gateway_inflight_requests, provider_request_duration_seconds, ratelimit_rejected_total, breaker_state
        kind: happy
        test: TestMetrics_AllSixMetricsPresent

  - id: NFR-008
    category: maintainability
    metric: test_race_free
    threshold: "0 race conditions detected"
    condition: when running go test -race ./...
    rationale: >
      Data races are the root cause of flaky load tests and production incidents.
      All tests must pass with the race detector enabled.
    acceptance:
      - id: AC-049
        given: full test suite
        when: go test -race ./... is run
        then: tests complete with exit code 0, no "DATA RACE" messages
        kind: happy
        test: TestSuite_RaceFree

constraints:
  - id: CON-001
    type: technical
    statement: >
      Language and stack are fixed: Go 1.23+, stdlib-first (net/http, log/slog), no heavy
      web frameworks, no "magic" ORMs. Dependencies: pgx/v5, go-redis/v9,
      golang.org/x/time/rate, golang.org/x/sync/errgroup, sony/gobreaker,
      prometheus/client_golang, OpenTelemetry SDK.
    source: doc/requirements.md §3, §9

  - id: CON-002
    type: technical
    statement: >
      Minimal external dependencies; no exotic packages — only defensible
      choices with active communities.
    source: doc/requirements.md §9

  - id: CON-003
    type: organizational
    statement: >
      One service, not microservices. Idiomatic directory structure per
      doc/requirements.md §4.
    source: doc/requirements.md §4, §9

  - id: CON-004
    type: technical
    statement: >
      CI: GitHub Actions — build + test -race + golangci-lint are mandatory for every PR.
    source: doc/requirements.md §3

  - id: CON-005
    type: technical
    statement: >
      make up brings up the full stack (gateway + postgres + redis + prometheus + grafana)
      via docker-compose with a single command.
    source: doc/requirements.md §3

  - id: CON-006
    type: technical
    statement: >
      Writing usage metrics to Postgres is performed exclusively asynchronously (outside
      the hot HTTP handler path). Synchronous writes on the request path are prohibited.
    source: doc/requirements.md §7, US-015
