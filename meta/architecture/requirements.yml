functional:
  - id: FR-001
    statement: >
      Gateway proxies POST /v1/chat/completions to the selected provider and
      returns the response to the client (plain JSON or SSE stream).
    source: [US-001, US-002]
    acceptance:
      - id: AC-001
        given: valid request with model and messages, provider is available and responds 200
        when: API Client sends POST /v1/chat/completions
        then: gateway returns 200 with the provider response body within < upstream latency + 20ms overhead
        kind: happy
        test: TestProxy_HappyPath_NonStreaming
      - id: AC-002
        given: valid request with "stream":true, provider is available
        when: API Client sends POST /v1/chat/completions
        then: gateway returns 200 with Content-Type text/event-stream and forwards SSE chunks as they arrive
        kind: happy
        test: TestProxy_HappyPath_Streaming
      - id: AC-003
        given: provider returns 500
        when: API Client sends POST /v1/chat/completions (retries exhausted)
        then: gateway returns 502 with a JSON error body
        kind: error
        test: TestProxy_ProviderError_Returns502
      - id: AC-004
        given: request body is absent or is not valid JSON
        when: API Client sends POST /v1/chat/completions
        then: gateway returns 400 without contacting the provider
        kind: negative
        test: TestProxy_InvalidBody_Returns400

  - id: FR-002
    statement: >
      Gateway routes the request to the correct provider based on the model
      field in the request body.
    source: [US-003]
    acceptance:
      - id: AC-005
        given: two providers are registered in the configuration for different models
        when: API Client specifies model "gpt-4"
        then: gateway routes the request to the provider registered for "gpt-4"
        kind: happy
        test: TestRouter_RoutesToCorrectProvider
      - id: AC-006
        given: model field is absent from the request body
        when: API Client sends POST /v1/chat/completions
        then: gateway returns 400 without contacting the provider
        kind: negative
        test: TestRouter_MissingModel_Returns400
      - id: AC-007
        given: model field refers to an unregistered model
        when: API Client sends POST /v1/chat/completions
        then: gateway returns 404 without contacting the provider
        kind: negative
        test: TestRouter_UnknownModel_Returns404

  - id: FR-003
    statement: >
      When the client connection is closed, gateway immediately cancels the upstream
      call via context cancellation.
    source: [US-004]
    acceptance:
      - id: AC-008
        given: a request to the provider is in flight, mock provider has 500ms latency
        when: client closes the connection 100ms after sending the request
        then: upstream HTTP call terminates with context.Canceled within 50ms of the connection being closed
        kind: happy
        invariant: INV-002
        policy: POL-006
        test: TestProxy_ClientCancel_AbortsUpstream
      - id: AC-009
        given: SSE stream is active, provider is sending chunks
        when: client closes the connection
        then: gateway stops forwarding chunks and the upstream call is cancelled
        kind: happy
        invariant: INV-002
        test: TestProxy_StreamingClientCancel_AbortsUpstream
      - id: AC-052
        given: two requests A and B are in flight to the provider, each with 500ms latency
        when: client A closes its connection 100ms in while client B stays connected
        then: A's upstream call is cancelled with context.Canceled, while B's upstream call is unaffected and completes normally with a 200 response (per-request context isolation)
        kind: concurrency
        invariant: INV-002
        test: TestProxy_ClientCancel_DoesNotAffectOtherInflight

  - id: FR-004
    statement: >
      Gateway enforces per-API-key rate limiting (token bucket, local +
      Redis). When the limit is exceeded it returns 429 with a Retry-After header.
    source: [US-005]
    acceptance:
      - id: AC-010
        given: API key "key-A" with limit 10 RPS, 10 requests already served within 1 second
        when: the 11th request arrives
        then: gateway returns 429 with a Retry-After header and does not contact the provider
        kind: happy
