  - id: FR-005
    statement: >
      Gateway caches responses to identical requests in Redis with a TTL; subsequent
      identical requests are served from the cache.
    source: [US-006]
    acceptance:
      - id: AC-014
        given: a request with body {"model":"mock","messages":[...]} has been executed and cached
