  - id: F-001
    severity: medium
    category: feature
    type: risk
    file: internal/ratelimit/ratelimit.go
    line: 205
    title: "Hard-cap LRU eviction can reset a throttled key's local bucket (eviction-as-bypass)"
    description: |
      evictLRULocked evicts purely by lastAccess and ignores token-bucket fill.
      A victim that bursts, gets throttled, then pauses to honour Retry-After has
      a stale lastAccess. An attacker flooding the registry with distinct fresh
      keys under cap pressure can make the victim's near-empty bucket the LRU
      entry and evict it; on the victim's next request it gets a brand-new FULL
      bucket — the local per-instance burst limit is reset. The distributed Redis
      tier (Tier 2) still enforces the per-key global cap, so the global limit is
      NOT bypassable; the exposure is the LOCAL tier only. It becomes the sole
      enforcement when repo is nil (single-instance default, main.go always wires
      Redis but the constructor permits nil and the default MemoryRepository path
      is per-instance). The idle-sweep is correctly safe (full-bucket only); only
      the hard-cap path has this property. Default maxKeys=100000 makes this
      expensive but not impossible to weaponise.
    suggestion: |
      In evictLRULocked, prefer evicting full/near-full buckets first (a bucket at
      capacity is safe to drop), and only evict a non-full (actively-throttled)
      bucket as a last resort — or skip eviction and reject (or briefly tolerate
      overshoot) when every entry is non-full. Alternatively raise the cap or
      document the local-tier reset as accepted given the Redis backstop.
    confidence: high
    source: static
    root_cause: null
    status: open
    fixed_in: null
    dismissed_reason: null

