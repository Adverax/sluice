      The minted cookie is HttpOnly + SameSite=Lax but not Secure. Over plain HTTP
      this is fine for a dev gateway, but in TLS deployments the rate-limit
      identity cookie can be sent over cleartext. Not a limit-bypass (the cookie
      is only an identifier, validated for shape, never trusted as auth), so it is
      Minor.
    suggestion: |
