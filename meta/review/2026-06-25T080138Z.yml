    title: "Mock cannot emit a mid-stream Chunk.Err"
    description: |
      The canonical Chunk contract (provider.go:114-137) defines a terminal
      mid-stream error path via Chunk.Err. The Mock only produces an init-time
      error (failErr before the channel is created); it has no option to emit a
      content chunk followed by a terminal Err chunk. CARD-004's streaming-error
      AC may need this capability from the stand-in provider.
    suggestion: |
