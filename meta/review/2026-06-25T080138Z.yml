  - id: F-002
    severity: low
    category: tech-debt
    type: risk
    file: internal/provider/mock.go
    line: 137
    title: "Early consumer exit without ctx-cancel blocks producer goroutine"
    description: |
      The unbuffered channel send is select{ out<- / ctx.Done() }. A consumer
      that stops ranging early WITHOUT cancelling ctx leaves the producer blocked
      on the send until ctx is eventually cancelled. The interface doc (provider.go
      :36-39) makes ctx-cancel the documented release mechanism, so this is a
      contract requirement on the caller, not a defect — but it is a real leak
      shape if a future caller breaks the contract.
    suggestion: |
      Keep the contract; ensure CARD-003/004 callers always cancel ctx (e.g. via
      defer cancel) when abandoning a stream. Optionally document the early-break
      requirement in the InferStream doc more explicitly.
    confidence: high
