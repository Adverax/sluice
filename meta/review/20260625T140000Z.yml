    file: internal/metrics/infer.go
    line: 50
    title: "Fast-fail (open breaker / saturation) still records provider metric + span"
    description: |
      Instrumentation wraps the pool (tracing(metrics(pool(breaker(provider))))),
      so a 503 fast-fail with NO provider call still observes
      provider_request_duration_seconds{provider} (~0s) and emits a provider.stream
      span. This is consistent with the unary path (same layering) and arguably
      acceptable, but it slightly inflates provider-latency series / span volume
      with attempts that never reached the provider.
    suggestion: |
      If undesired, skip the observation/span when err is ErrServiceUnavailable
      (open breaker / saturation). Otherwise document it as intended parity.
