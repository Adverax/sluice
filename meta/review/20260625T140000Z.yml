  - id: F-002
    severity: low
    category: tech-debt
    type: risk
    file: internal/metrics/infer.go
    line: 62
    title: "nil source channel from a misbehaving init leaks forwarder + slot"
    description: |
      All three forwarders (metrics:62, tracing:70, pool:212) select on `<-src`.
      If an inner layer returns (nil channel, nil error) — a StreamFunc/StreamCall
      contract violation — the forwarder blocks on the nil channel until ctx.Done,
      then `for range src` (nil) blocks forever: goroutine leak, pool slot never
      released, span never ended. Requires a provider returning (nil,nil) on init,
      so likelihood is low, but the chain has no defensive guard.
    suggestion: |
      In each StreamFunc wrapper, after a nil-error init, treat a nil src as an
      immediately-closed/empty stream (release slot / end span / observe now), or
      assert the contract at the breaker seam.
    confidence: medium
    source: static
    root_cause: null
    status: open
    fixed_in: null
    dismissed_reason: null

