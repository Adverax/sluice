    file: internal/server/server.go
    line: 483
    title: "Flush error ignored on content path"
    description: |
      After a content delta write, rc.Flush()'s error is discarded (_ = rc.Flush()).
      When the client is gone, the loop only stops on the next Write failure, so one
      extra chunk is attempted. Bounded and harmless (no spin) but asymmetric with the
      Write-error handling on lines 479-482.
    suggestion: |
      Treat a Flush error like a Write error: `if rc.Flush() != nil { return nil }`.
    confidence: high
    source: static
