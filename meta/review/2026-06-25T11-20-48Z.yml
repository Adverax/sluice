    line: 494
    title: "omitempty on Usage struct field is a no-op"
    description: |
      streamChunk.Usage is `json:"usage,omitempty"` but Go does not treat a zero struct
      as empty, so the usage object is serialized on every content delta despite the
      apparent intent to omit it.
    suggestion: |
      Drop omitempty (accept it's always present) or make Usage a *api.Usage set only on
      the terminal chunk.
