  - id: F-001
    severity: medium
    category: tech-debt
    type: gap
    file: internal/server/server.go
    line: 184
    title: "OpenAPI schema validation not enforced; role enum / required-messages reach the provider unvalidated"
    description: |
      The oapi-codegen strict server (api.gen.go:714) only json.Decode()s the body. It does not
      run openapi3filter request validation, and the generated MessageRole.Valid() / GetSwagger()
      are dead code (never referenced outside api.gen.go). Neither New() nor Handler() wires a
      validation middleware. Consequences at the ACL (toCanonicalRequest):
        - an unknown role (e.g. {"role":"banana"}) is mapped straight through as
          provider.Role(m.Role) with no rejection — the role-enum mapping is not total/validated;
        - a request with messages absent/empty (a `required`, min-items field in the spec) is
          accepted and forwarded to the provider with zero messages.
      ADR-0011 states "Request decoding/validation and routing are generated and consistent, not
      ad hoc" and lists generated request *validation* as a positive consequence; that claim is
      only half met (decode yes, schema-validate no). AC-004 (malformed/absent body -> 400) IS
      satisfied because a decode failure is caught.
    suggestion: |
      Wire openapi3filter via GetSwagger() (oapi-codegen nethttpmiddleware request validator) in
      Server.Handler, OR explicitly validate role/messages in toCanonicalRequest and return
      badRequest. If full schema validation is intentionally deferred to a later card, record that
      deferral in the backlog/card rather than leaving it implicit, since the ADR claims it.
    confidence: high
    source: model
    root_cause: RC-1
    status: open
    fixed_in: null
    dismissed_reason: null

  - id: F-002
    severity: low
    category: tech-debt
    type: risk
    file: cmd/gateway/main.go
    line: 72
    title: "Readiness per-check timeout sourced from Redis dial timeout"
    description: |
      health.New(logger, cfg.Redis.DialTimeout) bounds EVERY readiness check (redis AND postgres)
      with the Redis dial timeout knob. It is > 0 so AC-045 stays green and behaviour is correct,
      but the postgres check budget is governed by an unrelated Redis setting — a confusing coupling
      and a config foot-gun (raising/lowering Redis dial timeout silently changes the postgres
      readiness budget).
    suggestion: |
      Use a dedicated readiness/health-check timeout from config, or pass the max of the relevant
      dependency timeouts. At minimum, document why the redis dial timeout is the chosen budget.
    confidence: high
    source: static
    root_cause: null
    status: open
    fixed_in: null
    dismissed_reason: null

  - id: F-003
    severity: low
    category: tech-debt
    type: risk
    file: internal/health/health.go
    line: 101
    title: "Readiness checkers run sequentially under one shared timeout budget"
    description: |
      Evaluate runs checkers in a for-loop sharing a single context.WithTimeout(ctx, h.timeout).
      A slow/hanging first checker can consume the whole budget, so the second checker is evaluated
      against an already-near-expired ctx and may report a false 'down'. With only two fast pings
      this is low-probability, but the aggregate worst-case latency is the sum, not the max, of the
      checks — relevant once more checkers are registered.
    suggestion: |
      Run checkers concurrently (errgroup / goroutine-per-checker with a WaitGroup), each under the
      per-check timeout, and aggregate. Keeps /readyz latency bounded by the slowest single check.
    confidence: high
    source: static
    root_cause: null
    status: open
    fixed_in: null
    dismissed_reason: null
