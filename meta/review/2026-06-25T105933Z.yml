    file: internal/middleware/tracing_test.go
    line: 145
    title: "Hijack Unwrap tests are tautological — pass even without Unwrap()"
    description: |
      TestTracing_Unwrap_FlushAndHijackReachBase (and the metrics twin
      TestMetrics_Unwrap_HijackReachesBase) assert only `err != nil` and
      `!strings.Contains(err.Error(), "not implemented by handler")`. The fake's
      Hijack() returns http.ErrNotSupported ("feature not supported"), and when
      Unwrap() is ABSENT http.ResponseController also returns ErrNotSupported via
      errNotSupported() — same non-nil error, and net/http never emits the string
      "not implemented by handler" in this Go version. Verified empirically: a
      wrapper with NO Unwrap() passes both assertions. So these tests do not prove
      Hijack is forwarded through the wrapper — the exact regression cycle 1 flagged
      for CARD-004 SSE. The implementation is correct (both wrappers have Unwrap),
      but the guard is non-load-bearing.
    suggestion: |
      Make the fake's Hijack() return a unique sentinel error (e.g.
      errHijackReached := errors.New("hijack-reached")) and assert
      errors.Is(err, errHijackReached). That proves the call reached the fake's
      Hijack via Unwrap. The Flush half of the test is already valid.
    confidence: high
    source: static
