findings:
  - id: F-001
    severity: medium
    category: feature
    type: bug
    file: internal/middleware/cache.go
    line: 128
    title: "HIT response omits downstream headers (Content-Type) captured on MISS"
    description: |
      On a cache MISS the downstream handler sets Content-Type: application/json
      (and possibly other headers). The recorder captures only the body
      (rec.body), not the response header map, so a HIT replays the body with
      only X-Cache: HIT + 200 and no Content-Type. The same request therefore
      returns different response headers on HIT vs MISS; a JSON client relying on
      Content-Type can break on a HIT.
    suggestion: |
      Capture the relevant downstream response headers (at least Content-Type)
      alongside the body and replay them on HIT, or store a small envelope
      {headers, body}. At minimum set Content-Type: application/json on the HIT
      write to match the MISS path.
    confidence: high
    source: static
