    status: open
    fixed_in: null
    dismissed_reason: null

  - id: F-002
    severity: low
    category: compliance
    type: risk
    file: internal/middleware/cache.go
    line: 117
    title: "Cache key excludes API key — cross-tenant cache sharing + TTL influence"
    description: |
      The key is sha256(method, path, rawBody) and does not include the API key /
      Authorization header. For chat-completions identical body -> identical model
      output, so sharing the response across tenants is defensible and the body is
      not user-specific. Two side effects worth noting: (1) per-request X-Cache-TTL
      set by one tenant determines the lifetime of the shared entry, so tenant A can
      shorten/lengthen the freshness window seen by tenant B (staleness/hit-rate
      only, not data leak); (2) this is a deliberate design choice that should be
      documented as such.
    suggestion: |
      Document the cross-tenant sharing decision in the middleware doc comment /
      ADR-0004 explicitly. If responses ever become user-specific, fold the API key
      into the key. No change required for v1 chat-completions.
    confidence: medium
    source: static
    root_cause: null
    status: open
    fixed_in: null
    dismissed_reason: null

  - id: F-003
    severity: low
    category: tech-debt
    type: risk
    file: internal/middleware/cache.go
    line: 96
    title: "No size cap on request body read (io.ReadAll)"
    description: |
      io.ReadAll(r.Body) reads the full request body into memory before keying.
      ReadTimeout bounds time but not size, so a large body is fully buffered (and
      buffered again by the recorder for the response). No unbounded growth across
      requests, but a single large request is unbounded memory.
    suggestion: |
      Consider http.MaxBytesReader / an explicit cap on the body read in the cache
      middleware (or rely on a documented server-level limit). Low priority since
      the OpenAPI validator and ReadTimeout also constrain it.
    confidence: high
    source: static
    root_cause: null
    status: open
    fixed_in: null
    dismissed_reason: null
