findings:
  - id: F-001
    severity: medium
    category: feature
    type: risk
    file: internal/lifecycle/lifecycle.go
    line: 149
    title: "Metering flush hook reuses an exhausted shutdownCtx on the forced path"
    description: |
      shutdown() passes the SAME shutdownCtx to both server.Shutdown and the
      OnShutdown hooks. On the forced path (AC-051) server.Shutdown consumes the
      entire shutdownTimeout before returning DeadlineExceeded, so shutdownCtx is
      already done when meteringWorker.Close(shutdownCtx) runs — Close hits
      <-ctx.Done() immediately and returns without draining the buffer. The
      comment "Run them even on the forced path so usage events are not lost" is
      therefore inaccurate: on the forced path nothing is flushed. Even on the
      clean path the flush only gets whatever budget the HTTP drain left.
    suggestion: |
      Give the post-drain hooks their own deadline (e.g. a fresh
      context.WithTimeout, or a separate GATEWAY_METERING_FLUSH_TIMEOUT) rather
      than the residual HTTP-drain context, and soften the comment to reflect that
      forced-path flushing is best-effort.
    confidence: high
    source: static
    root_cause: RC-1
    status: open
    fixed_in: null
    dismissed_reason: null

  - id: F-002
    severity: low
    category: feature
    type: gap
    file: meta/architecture/decisions/adr/0007-proxy-metering-buffered-channel.md
    line: 17
    title: "Implementation deviates from ADR-0007's close-the-channel shutdown mechanism"
    description: |
      ADR-0007 (accepted) states shutdown works by "Proxy closes the channel after
      draining in-flight requests; Metering drains the remaining events". The code
      deliberately never closes the buffer channel (Worker.Close closes a separate
      `stop` channel). The implemented choice is SAFER (it removes any send-on-
      closed-channel panic risk against the still-referenced Sink), but it is an
      intent-vs-reality divergence from the documented mechanism.
    suggestion: |
      Add a short note to ADR-0007 (or a follow-up) recording that the realised
      design uses a stop-signal + drain instead of close-the-channel, and why
      (avoids send-on-closed panic). Keeps the model honest.
    confidence: high
    source: model
    root_cause: null
    status: open
    fixed_in: null
    dismissed_reason: null

  - id: F-003
    severity: low
    category: feature
    type: question
    file: internal/server/server.go
    line: 559
    title: "Streaming UsageEvent sets Provider and Model both to the route alias"
    description: |
      streamResponse.recordUsage sets Provider: r.model and Model: r.model (the
      route alias), whereas the unary path records Provider: routeKey and
      Model: resp.Model (the resolved model). The provider.Chunk carries no Model,
      so the alias is the only value available, but the asymmetry means streamed
      rows cannot distinguish alias from resolved model. Acceptable for a
      best-effort metric, but inconsistent.
    suggestion: |
      Document the limitation in the doc-comment, or carry a Model on the terminal
      provider.Chunk so streaming rows match the unary semantics.
    confidence: high
    source: static
    root_cause: null
    status: open
    fixed_in: null
