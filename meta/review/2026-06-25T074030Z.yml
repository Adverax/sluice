  - id: F-002
    severity: low
    category: tech-debt
    type: risk
    file: internal/lifecycle/lifecycle.go
    line: 88
    title: "Drain count is a start-of-shutdown snapshot, not a true drained tally"
    description: |
      `draining` samples inFlight once at the top of shutdown() and logs it as
      both "drained N" and the in_flight attr. After server.Shutdown completes
      the actual number that finished may differ if any request errored out or
      if the drain hit the shutdownTimeout (forced close). The "drained N" line
      would then overstate completions. AC-046 passes because all 10 are
      confirmed in-flight before cancel and latency < shutdownTimeout, but the
      message semantics ("requests actually drained") are not guaranteed on the
      timeout/forced-close path.
    suggestion: |
      Either reword the log to "draining N in-flight requests" (honest about
      being a snapshot), or on Shutdown timeout log the residual
      atomic.LoadInt64(&m.inFlight) as not-drained so the count cannot overstate.
    confidence: medium
    source: static
    root_cause: null
    status: open
    fixed_in: null
    dismissed_reason: null
